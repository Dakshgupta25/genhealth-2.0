# A generic, single database configuration.

[alembic]
# path to migration script directory
script_location = alembic

# template used to generate migration file names; The default is %%(rev)s_%%(slug)s
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

# timezone to use when rendering the date within the file template
# timezone =

# sqlalchemy.url is dynamically overridden in env.py from app.config.settings
sqlalchemy.url = postgresql://genhealth_user:your_password_here@localhost:5432/genhealth_dev

[post_write_hooks]

[logging]
default_handler = console

[loggers]
keys = root,alembic,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
